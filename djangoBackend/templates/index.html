<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Django Backend - Deployment Successful</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }
      .container {
        text-align: center;
        background: white;
        padding: 50px;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }
      h1 {
        color: #333;
        margin: 0 0 10px 0;
      }
      p {
        color: #666;
        font-size: 18px;
        margin: 10px 0;
      }
      .success {
        color: #27ae60 !important;
        font-weight: bold;
        font-size: 20px;
      }
      .info {
        background: #ecf0f1;
        padding: 20px;
        border-radius: 5px;
        margin-top: 20px;
        text-align: left;
      }
      .api-link {
        color: #667eea;
        text-decoration: none;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🚀 Django Backend</h1>
      <p class="success">✓ Deployment Successful!</p>
      <p>Your Django backend is running on PythonAnywhere</p>

      <div class="info">
        <h3>API Endpoints:</h3>
        <p>
          <a href="/userAuth/login/" class="api-link">/userAuth/login/</a> -
          User login
        </p>
        <p>
          <a href="/userAuth/register/" class="api-link">/userAuth/register/</a>
          - User registration
        </p>
        <p><a href="/admin/" class="api-link">/admin/</a> - Django admin</p>
      </div>
    </div>
  </body>
</html>
